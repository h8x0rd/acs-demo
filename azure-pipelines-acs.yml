trigger: none

parameters:
- name: acsMode
  displayName: ACS test mode
  type: string
  default: fail
  values:
    - fail
    - pass

- name: runImageCheck
  displayName: Run ACS image check
  type: boolean
  default: false

variables:
  agentPool: gm-agents
  namespace: webapp1
  deploymentName: acs-demo
  routeName: acs-demo
  manifestRoot: k8s
  HOME: $(Agent.TempDirectory)
  KUBECONFIG: $(Agent.TempDirectory)/.kube/config

stages:
- stage: ACSGate
  displayName: ACS policy gate
  jobs:
  - job: CheckManifest
    displayName: Check manifest with ACS
    pool:
      name: $(agentPool)
    steps:
    - checkout: self
    - script: |
    set -euo pipefail
    mkdir -p "$HOME/.kube"

    if [ "${{ parameters.acsMode }}" = "fail" ]; then
      MANIFEST_FILE="$(manifestRoot)/bad/nginx.yaml"
    else
      MANIFEST_FILE="$(manifestRoot)/good/nginx.yaml"
    fi

    echo "Using manifest: ${MANIFEST_FILE}"

    RHACS_VERSION="4.10.0"
    curl -fL --retry 3 \
      "https://mirror.openshift.com/pub/rhacs/assets/${RHACS_VERSION}/bin/Linux/roxctl" \
      -o roxctl

    chmod +x roxctl
    file ./roxctl
    ./roxctl version

    ./roxctl deployment check \
      --endpoint "$(ROX_ENDPOINT)" \
      --token "$(ROX_API_TOKEN)" \
      --file "${MANIFEST_FILE}" \
      -o table
  displayName: ACS deployment check
  env:
    ROX_ENDPOINT: $(ROX_ENDPOINT)
    ROX_API_TOKEN: $(ROX_API_TOKEN)
    ROX_INSECURE_CLIENT_SKIP_TLS_VERIFY: $(ROX_INSECURE_CLIENT_SKIP_TLS_VERIFY)

  - job: CheckImage
    displayName: Check image with ACS
    dependsOn: CheckManifest
    condition: and(succeeded(), eq('${{ parameters.runImageCheck }}', 'true'))
    pool:
      name: $(agentPool)
    steps:
    - checkout: none

    - script: |
        set -euo pipefail

        if [ -z "$(IMAGE_REF)" ]; then
          echo "IMAGE_REF is empty"
          exit 1
        fi

        echo "Downloading roxctl from ACS Central"
        curl -ksS "https://$(ROX_ENDPOINT)/api/cli/download/roxctl-linux" -o roxctl
        chmod +x roxctl

        echo "Running ACS image check on $(IMAGE_REF)"
        ./roxctl image check \
          --endpoint "$(ROX_ENDPOINT)" \
          --token "$(ROX_API_TOKEN)" \
          --image "$(IMAGE_REF)" \
          -o table
      displayName: ACS image check
      env:
        ROX_ENDPOINT: $(ROX_ENDPOINT)
        ROX_API_TOKEN: $(ROX_API_TOKEN)
        ROX_INSECURE_CLIENT_SKIP_TLS_VERIFY: $(ROX_INSECURE_CLIENT_SKIP_TLS_VERIFY)
        IMAGE_REF: $(IMAGE_REF)

- stage: Deploy
  displayName: Deploy to OpenShift
  dependsOn: ACSGate
  condition: succeeded()
  jobs:
  - job: DeployApp
    displayName: Deploy sample app
    pool:
      name: $(agentPool)
    steps:
    - checkout: self

    - script: |
        set -euo pipefail
        mkdir -p "$HOME/.kube"

        if [ "${{ parameters.acsMode }}" = "fail" ]; then
          MANIFEST_FILE="$(manifestRoot)/bad/nginx.yaml"
        else
          MANIFEST_FILE="$(manifestRoot)/good/nginx.yaml"
        fi

        echo "Deploying ${MANIFEST_FILE}"
        oc whoami || true
        oc apply -n "$(namespace)" -f "${MANIFEST_FILE}"
      displayName: Deploy manifest

    - script: |
        set -euo pipefail
        mkdir -p "$HOME/.kube"

        oc rollout status deployment/$(deploymentName) -n "$(namespace)" --timeout=180s
        echo
        oc get all -n "$(namespace)"
        echo
        echo "Route:"
        oc get route $(routeName) -n "$(namespace)" -o jsonpath='{.spec.host}{"\n"}'
      displayName: Verify rollout
